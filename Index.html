<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말랑말랑 가로세로 낱말퀴즈 🧩</title>
    <style>
        :root {
            --primary-color: #ff7675;
            --secondary-color: #74b9ff;
            --background-color: #f7f9fc;
            --box-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2d3436;
        }

        h1 {
            color: #6c5ce7;
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px #ffeaa7;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 25px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--box-shadow);
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
            gap: 25px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .game-container {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        /* 퍼즐판 스타일 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 55px);
            grid-template-rows: repeat(5, 55px);
            gap: 6px;
            background-color: #dfe6e9;
            padding: 10px;
            border-radius: 16px;
            justify-content: center;
            margin: 0 auto;
        }

        .cell {
            position: relative;
            background-color: #fff;
            border: 2px solid #b2bec3;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cell.empty {
            background-color: #dfe6e9;
            border: none;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2d3436;
            border-radius: 6px;
            outline: none;
        }

        .cell input:focus {
            background-color: #ffeaa7;
        }

        .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #0984e3;
            z-index: 10;
        }

        /* 힌트 영역 스타일 */
        .clues-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .clue-section {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 12px;
        }

        .clue-section h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #2f3542;
            border-bottom: 2px solid #ced6e0;
            padding-bottom: 5px;
            font-size: 1.1rem;
        }

        .clue-item {
            font-size: 0.95rem;
            margin: 6px 0;
            line-height: 1.4;
        }

        .clue-number {
            font-weight: bold;
            color: #e84393;
            margin-right: 5px;
        }

        /* 버튼 및 결과 영역 */
        .button-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 10px;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            background-color: #1dd1a1;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: #10ac84;
            transform: translateY(-2px);
        }

        .result-message {
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
            text-align: center;
        }
        
        .success { color: #10ac84; }
        .wrong { color: #ee5253; }

        /* 📝 단어 저장소 섹션 */
        .storage-container {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--box-shadow);
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }

        .storage-container h2 {
            margin-top: 0;
            color: #ff7675;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        @media (min-width: 600px) {
            .input-group {
                flex-direction: row;
            }
        }

        .input-group input {
            padding: 12px;
            border: 2px solid #ffeaa7;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            flex: 1;
        }

        .input-group input:focus {
            border-color: #ff7675;
        }

        .input-group input.word-input {
            flex: 0 0 150px;
        }

        .btn-add {
            background-color: #ff7675;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: #e17055;
        }

        /* 단어 리스트 카드 스타일 */
        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .word-card {
            background: #fff9f9;
            border: 2px dashed #ffb8b8;
            padding: 15px;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .card-word {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d63031;
            margin-bottom: 5px;
        }

        .card-meaning {
            font-size: 0.95rem;
            color: #636e72;
            line-height: 1.4;
        }

        .btn-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            color: #b2bec3;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-delete:hover {
            color: #ff7675;
        }
    </style>
</head>
<body>

    <h1>말랑말랑 가로세로 낱말퀴즈 🧩</h1>
    <p class="subtitle">알맞은 글자를 빈칸에 넣고 정답을 확인해봐요!</p>

    <div class="game-container">
        <div class="grid-container" id="grid"></div>
        <div class="clues-container">
            <div class="clue-section">
                <h3>↔️ 가로 열쇠</h3>
                <div class="clue-item"><span class="clue-number">①</span> 가을이 되면 빨갛게 익는 달콤한 과일이에요.</div>
                <div class="clue-item"><span class="clue-number">③</span> 하늘을 호랑나비처럼 예쁘게 날아다니는 곤충이에요.</div>
            </div>
            <div class="clue-section">
                <h3>↕️ 세로 열쇠</h3>
                <div class="clue-item"><span class="clue-number">①</span> 생각하고 말을 할 수 있는 우리 같은 존재예요.</div>
                <div class="clue-item"><span class="clue-number">②</span> 가게에서 파는 바삭바삭하고 맛있는 간식이에요.</div>
            </div>
        </div>
    </div>

    <div class="button-area">
        <button class="btn" onclick="checkAnswers()">정답 확인하기! ✨</button>
        <div class="result-message" id="result-msg"></div>
    </div>

    <div class="storage-container">
        <h2>📝 나만의 비밀 단어장</h2>
        <p style="color:#636e72; margin-top:0; font-size:0.9rem;">어려운 단어나 기억하고 싶은 단어를 퀴즈 아래에 모아보세요!</p>
        
        <div class="input-group">
            <input type="text" id="input-word" class="word-input" placeholder="새로운 단어 (예: 사과)">
            <input type="text" id="input-meaning" placeholder="단어의 뜻 (예: 가을에 익는 빨간 과일)">
            <button class="btn-add" onclick="addWord()">단어 기억하기 ⭐</button>
        </div>

        <div class="word-list" id="word-list-box">
            </div>
    </div>

    <script>
        // 1. 크로스워드 게임 로직
        const solutionGrid = [
            ['사', '과', null, null, null],
            ['람', '자', null, null, null],
            [null, '나', '비', null, null],
            [null, null, null, null, null],
            [null, null, null, null, null]
        ];

        const cellNumbers = { "0,0": "1", "0,1": "2", "2,1": "3" };
        const gridElement = document.getElementById('grid');

        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 5; c++) {
                const cellDiv = document.createElement('div');
                if (solutionGrid[r][c] === null) {
                    cellDiv.className = 'cell empty';
                } else {
                    cellDiv.className = 'cell';
                    const coordKey = `${r},${c}`;
                    if (cellNumbers[coordKey]) {
                        const numSpan = document.createElement('span');
                        numSpan.className = 'cell-number';
                        numSpan.innerText = cellNumbers[coordKey];
                        cellDiv.appendChild(numSpan);
                    }
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    input.dataset.row = r;
                    input.dataset.col = c;
                    cellDiv.appendChild(input);
                }
                gridElement.appendChild(cellDiv);
            }
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('.cell input');
            let isAllCorrect = true;
            let hasEmpty = false;

            inputs.forEach(input => {
                const r = input.dataset.row;
                const c = input.dataset.col;
                const userAnswer = input.value.trim();
                const correctAnswer = solutionGrid[r][c];

                if (userAnswer === "") { hasEmpty = true; isAllCorrect = false; }
                else if (userAnswer !== correctAnswer) { isAllCorrect = false; }
            });

            const resultMsg = document.getElementById('result-msg');
            if (hasEmpty) {
                resultMsg.className = "result-message wrong";
                resultMsg.innerText = "⚠️ 아직 안 채운 칸이 있어요! 모두 채워보세요.";
            } else if (isAllCorrect) {
                resultMsg.className = "result-message success";
                resultMsg.innerText = "🎉 대단해요! 모든 문제를 맞혔어요! 참 잘했어요! 👍";
            } else {
                resultMsg.className = "result-message wrong";
                resultMsg.innerText = "❌ 틀린 글자가 있어요. 다시 한번 생각해볼까요?";
            }
        }

        // 2. 단어 저장소 로직
        function addWord() {
            const wordInput = document.getElementById('input-word');
            const meaningInput = document.getElementById('input-meaning');
            
            const word = wordInput.value.trim();
            const meaning = meaningInput.value.trim();

            if (word === "" || meaning === "") {
                alert("단어와 뜻을 모두 입력해 주세요! 😉");
                return;
            }

            // 단어 카드 생성
            const wordListBox = document.getElementById('word-list-box');
            const card = document.createElement('div');
            card.className = 'word-card';
            
            card.innerHTML = `
                <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
                <div class="card-word">${word}</div>
                <div class="card-meaning">${meaning}</div>
            `;

            wordListBox.appendChild(card);

            // 입력창 초기화
            wordInput.value = "";
            meaningInput.value = "";
            wordInput.focus();
        }
    </script>
</body>
</html>
